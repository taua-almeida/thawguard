{{ define "pages/password-recovery-message" }}
<div class="flex flex-col items-center gap-3 text-center">
  <h1 class="m-0 text-base font-bold text-text">{{ .Heading }}</h1>
  <p class="m-0 text-sm text-text-muted">{{ .Message }}</p>
  {{ if .ActionHref }}{{ template "ui/button" dict "Label" .ActionLabel "Variant" "secondary" "Href" .ActionHref }}{{ end }}
</div>
{{ end }}
