services:
  thawguard:
    build:
      context: .
    image: thawguard:local-alpha
    # Host networking keeps first-admin setup bound to 127.0.0.1
    # while remaining reachable at http://127.0.0.1:8080 on Linux hosts.
    network_mode: host
    environment:
      THAWGUARD_HTTP_ADDR: 127.0.0.1:8080
      THAWGUARD_DB_PATH: /data/thawguard.db
      THAWGUARD_PUBLIC_URL: ${THAWGUARD_PUBLIC_URL:-http://127.0.0.1:8080}
      THAWGUARD_SECRET_KEY: ${THAWGUARD_SECRET_KEY:?set THAWGUARD_SECRET_KEY in .env}
    volumes:
      - thawguard-data:/data
    healthcheck:
      test:
        - CMD
        - bash
        - -ec
        - |
          exec 3<>/dev/tcp/127.0.0.1/8080
          printf 'GET /healthz HTTP/1.1\r\nHost: 127.0.0.1\r\nConnection: close\r\n\r\n' >&3
          IFS=' ' read -r _ status _ <&3
          test "$$status" = 200
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s
    restart: unless-stopped

volumes:
  thawguard-data:
